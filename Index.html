<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
}

#container {
  width: 600px;
  margin-top: 40px;
}

#chat {
  height: 500px;
  overflow-y: auto;
  background: #111827;
  padding: 10px;
  border-radius: 10px;
}

.msg {
  padding: 10px;
  margin: 8px;
  border-radius: 10px;
  max-width: 80%;
  white-space: pre-wrap;
}

.user {
  background: #2563eb;
  margin-left: auto;
}

.bot {
  background: #374151;
}

#inputArea {
  display: flex;
  margin-top: 10px;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
}
</style>
</head>

<body>

<div id="container">
  <h2>AI Assistant</h2>

  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Ask something...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

const BACKEND_URL = "https://ai-chatbot-hrit.onrender.com";

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  input.value = "";

  if (!text) return;

  addMsg(text, "user");

  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text
      })
    });

    const data = await res.json();
    addMsg(data.reply || "No response", "bot");

  } catch (err) {
    addMsg("Error connecting to server", "bot");
  }
}

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = 999999;
}

</script>

</body>
</html>
